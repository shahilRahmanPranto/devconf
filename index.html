<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devconf</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- nav starts here  -->
    <header>
      <nav class="navbar container">
        <!-- logo  -->
        <div class="logo">
          <img src="./images/logo.png" alt="logo of devf" />
        </div>
        <!-- main menu -->
        <div class="main__menu">
          <ul>
            <li>Speakers</li>
            <li>Schedule</li>
            <li>Tracks</li>
            <li>Venue</li>
          </ul>
        </div>
        <!-- button  -->
        <button class="common__btn">Register Now</button>
      </nav>
      <!-- navbar ends here  -->
    </header>
    <main>
      <!-- hero section starts -->

      <section class="hero container">
        <div class="hero__content">
          <div class="hero__text">
            <h1 class="title">Code. <em>Connect.</em> Create</h1>
            <p class="subtitle">
              Join 4,000+ engineers, founders, and builders at the premier
              developer conference of 2026. Three days of cutting-edge talks,
              hands-on workshops, and meaningful connections.
            </p>
          </div>
          <button class="common__btn">Register Now</button>
        </div>
      </section>

      <!-- hero section ends -->
    </main>
  </body>
</html>
